<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creatorpulse — your AI cofounder for content</title>
  <meta name="description" content="AI-powered content intelligence for solo creators. Discover viral trends, generate scripts that sound like you." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400;1,14..32,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper:      '#FBF9F4',
            paper2:     '#F4EFE5',
            card:       '#FFFFFF',
            ink:        '#1A1714',
            ink2:       '#524A3F',
            ink3:       '#8B8170',
            ink4:       '#BBB4A4',
            line:       '#E8E2D2',
            line2:      '#F0EBDF',
            terra:      '#C47338',
            terrasoft:  '#F5E4D0',
            terradeep:  '#A35C26',
            successc:   '#5E8049',
            successsoft:'#E5EBDB',
            warnc:      '#C28A2F',
            errorc:     '#C04A2E',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          boxShadow: {
            card: '0 1px 0 rgba(26,23,20,0.04), 0 1px 2px rgba(26,23,20,0.04)',
            lift: '0 4px 16px -4px rgba(26,23,20,0.10), 0 1px 0 rgba(26,23,20,0.04)',
            pop:  '0 12px 32px -8px rgba(26,23,20,0.14), 0 2px 4px rgba(26,23,20,0.04)',
          },
        }
      }
    }
  </script>

  <style>
    /* ============================================================
       Creatorpulse — refined product design (aicofounder-inspired)
       ============================================================ */

    :root {
      --paper:     #FBF9F4;
      --paper2:    #F4EFE5;
      --card:      #FFFFFF;
      --ink:       #1A1714;
      --ink2:      #524A3F;
      --ink3:      #8B8170;
      --ink4:      #BBB4A4;
      --line:      #E8E2D2;
      --line2:     #F0EBDF;
      --terra:     #C47338;
      --terrasoft: #F5E4D0;
      --terradeep: #A35C26;
      --success:   #5E8049;
      --warn:      #C28A2F;
      --error:     #C04A2E;
    }

    html, body { background: var(--paper); color: var(--ink); }
    body {
      font-family: Inter, system-ui, sans-serif;
      font-feature-settings: "cv11", "ss01", "ss03";
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Buttons */
    .btn { display:inline-flex; align-items:center; gap:.5rem; padding:.55rem 1rem; font-weight:500; font-size:13.5px; border-radius:8px; transition:all .15s ease; line-height:1; cursor:pointer; white-space:nowrap; border:none; }
    .btn:disabled { opacity:.45; cursor:not-allowed; }
    .btn-primary { background:var(--ink); color:#fff; }
    .btn-primary:hover:not(:disabled) { background:#2A2520; transform:translateY(-1px); box-shadow:0 4px 12px -4px rgba(26,23,20,.30); }
    .btn-terra { background:var(--terra); color:#fff; }
    .btn-terra:hover:not(:disabled) { background:var(--terradeep); }
    .btn-soft  { background:var(--card); color:var(--ink); border:1px solid var(--line); }
    .btn-soft:hover:not(:disabled) { background:var(--paper2); border-color:var(--ink4); }
    .btn-ghost { background:transparent; color:var(--ink2); }
    .btn-ghost:hover:not(:disabled) { background:var(--paper2); color:var(--ink); }
    .btn-sm { font-size:12.5px; padding:.4rem .75rem; }
    .btn-lg { font-size:14.5px; padding:.75rem 1.25rem; }

    /* Inputs */
    .field { background:#fff; border:1px solid var(--line); border-radius:10px; padding:.65rem .85rem; font-size:14px; width:100%; outline:none; color:var(--ink); transition:border-color .15s ease,box-shadow .15s ease; font-family:Inter,system-ui,sans-serif; }
    .field::placeholder { color:var(--ink3); }
    .field:focus { border-color:var(--terra); box-shadow:0 0 0 3px rgba(196,115,56,.12); }
    .field.field-error { border-color:var(--error); box-shadow:0 0 0 3px rgba(192,74,46,.10); }
    textarea.field { resize:vertical; line-height:1.5; padding:.75rem .85rem; }
    select.field { cursor:pointer; }

    /* Cards */
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; box-shadow:0 1px 0 rgba(26,23,20,.04),0 1px 2px rgba(26,23,20,.04); }
    .card-soft { background:var(--paper2); border:1px solid var(--line); border-radius:12px; }

    /* Chips */
    .chip { display:inline-flex; align-items:center; gap:.35rem; padding:.2rem .55rem; font-size:11.5px; font-weight:500; line-height:1.5; border-radius:6px; }
    .chip-line    { background:var(--card); border:1px solid var(--line); color:var(--ink2); }
    .chip-soft    { background:var(--paper2); color:var(--ink2); }
    .chip-ink     { background:var(--ink); color:#fff; }
    .chip-terra   { background:var(--terrasoft); color:var(--terradeep); border:1px solid #EBD3B6; }
    .chip-success { background:#E5EBDB; color:var(--success); border:1px solid #D2DCC0; }
    .chip-warn    { background:#F5EBCF; color:#8B6313; border:1px solid #E6D7AE; }
    .chip-error   { background:#F5DDD2; color:var(--error); border:1px solid #ECC6B5; }

    /* Segmented control */
    .seg { display:inline-flex; background:var(--paper2); border:1px solid var(--line); border-radius:9px; padding:3px; gap:2px; }
    .seg button { padding:.35rem .85rem; border-radius:6px; font-size:12.5px; color:var(--ink2); font-weight:500; transition:all .15s ease; border:none; background:transparent; cursor:pointer; }
    .seg button[data-active="true"] { background:#fff; color:var(--ink); box-shadow:0 1px 0 rgba(26,23,20,.05),0 1px 2px rgba(26,23,20,.06); }
    .seg button:hover:not([data-active="true"]) { color:var(--ink); }

    /* Pill multi-select */
    .pill { display:inline-flex; align-items:center; gap:.4rem; padding:.5rem .9rem; border-radius:999px; font-size:13px; font-weight:500; border:1px solid var(--line); background:#fff; color:var(--ink2); cursor:pointer; transition:all .15s ease; }
    .pill:hover { border-color:var(--ink4); color:var(--ink); }
    .pill[data-active="true"] { background:var(--ink); color:#fff; border-color:var(--ink); }

    /* Sidebar nav */
    .side-link { display:flex; align-items:center; gap:10px; padding:7px 10px; border-radius:8px; font-size:13.5px; font-weight:500; color:var(--ink2); transition:all .12s ease; cursor:pointer; background:transparent; border:none; width:100%; text-align:left; }
    .side-link:hover { background:var(--paper2); color:var(--ink); }
    .side-link[data-active="true"] { background:#fff; color:var(--ink); box-shadow:0 1px 0 rgba(26,23,20,.04),0 1px 2px rgba(26,23,20,.06); border:1px solid var(--line); padding:6px 9px; }

    /* Topbar search */
    .topbar-search { display:flex; align-items:center; gap:8px; height:34px; padding:0 10px; border:1px solid var(--line); border-radius:8px; background:#fff; font-size:13px; color:var(--ink3); width:300px; transition:all .15s ease; cursor:text; }
    .topbar-search:hover { border-color:var(--ink4); }

    /* Tooltip */
    .tt-anchor { position:relative; display:inline-flex; }
    .tt { position:absolute; z-index:60; pointer-events:none; background:var(--ink); color:#fff; padding:5px 9px; border-radius:6px; font-size:11.5px; line-height:1.4; font-weight:500; white-space:nowrap; opacity:0; transform:translateY(2px); transition:opacity .12s ease,transform .12s ease; box-shadow:0 4px 14px rgba(26,23,20,.18); }
    .tt-anchor:hover .tt, .tt-anchor:focus-within .tt { opacity:1; transform:translateY(0); }
    .tt::after { content:''; position:absolute; width:6px; height:6px; background:var(--ink); transform:rotate(45deg); }
    .tt-top    { bottom:calc(100% + 6px); left:50%; transform:translate(-50%,2px); }
    .tt-top::after { left:50%; bottom:-3px; margin-left:-3px; }
    .tt-anchor:hover .tt-top { transform:translate(-50%,0); }
    .tt-bottom { top:calc(100% + 6px); left:50%; transform:translate(-50%,-2px); }
    .tt-bottom::after { left:50%; top:-3px; margin-left:-3px; }
    .tt-anchor:hover .tt-bottom { transform:translate(-50%,0); }
    .tt-right  { left:calc(100% + 6px); top:50%; transform:translate(-2px,-50%); }
    .tt-right::after { top:50%; left:-3px; margin-top:-3px; }
    .tt-anchor:hover .tt-right { transform:translate(0,-50%); }
    .tt-left   { right:calc(100% + 6px); top:50%; transform:translate(2px,-50%); }
    .tt-left::after { top:50%; right:-3px; margin-top:-3px; }
    .tt-anchor:hover .tt-left { transform:translate(0,-50%); }

    /* Banner */
    .banner { display:flex; gap:.75rem; padding:.9rem 1.1rem; border-radius:10px; border-left:3px solid; align-items:flex-start; }
    .banner-info    { background:#F4F1EA; border-left-color:var(--ink2); color:var(--ink2); }
    .banner-success { background:#EAEFE0; border-left-color:var(--success); color:var(--success); }
    .banner-warn    { background:#F5EBCF; border-left-color:var(--warn); color:#8B6313; }
    .banner-error   { background:#F5DDD2; border-left-color:var(--error); color:var(--error); }

    /* Chat bubbles */
    .bubble-ai { background:#fff; border:1px solid var(--line); border-radius:14px; border-top-left-radius:4px; padding:12px 16px; color:var(--ink); font-size:14.5px; line-height:1.55; max-width:84%; box-shadow:0 1px 0 rgba(26,23,20,.03); }
    .bubble-user { background:var(--ink); color:#fff; border-radius:14px; border-top-right-radius:4px; padding:10px 14px; font-size:13.5px; line-height:1.5; max-width:80%; font-family:"JetBrains Mono",monospace; }

    /* Logo */
    .cp-logomark { display:inline-flex; align-items:center; justify-content:center; background:var(--ink); color:var(--terra); border-radius:7px; font-weight:700; letter-spacing:-0.02em; }

    /* Kicker label */
    .kicker { font-size:11px; text-transform:uppercase; letter-spacing:0.10em; color:var(--ink3); font-weight:600; }

    /* Animations */
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation:fadeUp .35s cubic-bezier(.16,1,.3,1) forwards; opacity:0; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .fade-in { animation:fadeIn .25s ease forwards; opacity:0; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .spin { animation:spin 1s linear infinite; }
    @keyframes typingDot { 0%,60%,100%{transform:translateY(0);opacity:.35} 30%{transform:translateY(-3px);opacity:1} }
    .tdot { display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--ink3); margin:0 1.5px; animation:typingDot 1.2s infinite ease-in-out; }
    .tdot:nth-child(2) { animation-delay:.15s; }
    .tdot:nth-child(3) { animation-delay:.30s; }
    @keyframes pulseSoft { 0%,100%{opacity:.5} 50%{opacity:1} }
    .pulse-soft { animation:pulseSoft 2s ease-in-out infinite; }
    @keyframes skel { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    .skel { background:linear-gradient(90deg,#ECE6D7 0%,#F4EEDF 50%,#ECE6D7 100%); background-size:200% 100%; animation:skel 1.6s ease-in-out infinite; border-radius:4px; }
    @keyframes livePulse { 0%,100%{box-shadow:0 0 0 0 rgba(94,128,73,.5)} 50%{box-shadow:0 0 0 5px rgba(94,128,73,0)} }
    .live-dot { animation:livePulse 2s infinite; }

    /* Scrollbar */
    * { scrollbar-width:thin; scrollbar-color:var(--ink4) transparent; }
    *::-webkit-scrollbar { width:8px; height:8px; }
    *::-webkit-scrollbar-thumb { background:var(--ink4); border-radius:4px; }
    *::-webkit-scrollbar-track { background:transparent; }
    ::selection { background:var(--terra); color:#fff; }
  </style>
</head>
<body class="bg-paper text-ink antialiased">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

</body>
</html>
