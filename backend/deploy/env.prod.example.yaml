# Cloud Run env-vars file (first-deploy convenience).
# Copy to env.prod.yaml, fill in real values, and keep it OUT of git.
# Deploy with: gcloud run deploy ... --env-vars-file deploy/env.prod.yaml
#
# For production, prefer Secret Manager for the sensitive values (DATABASE_URL,
# CLERK_SECRET_KEY, GOOGLE_SERVICE_ACCOUNT_JSON, REDIS_URL) via --set-secrets.

NODE_ENV: "production"
TRUST_PROXY: "1"

# Database — Supabase pooler string (port 6543). REQUIRED (PGlite won't persist on Cloud Run).
DATABASE_URL: "postgresql://postgres.xxx:[password]@aws-0-[region].pooler.supabase.com:6543/postgres"

# Auth (Clerk)
CLERK_SECRET_KEY: "sk_live_..."
CLERK_PUBLISHABLE_KEY: "pk_live_..."

# AI (Vertex AI / Gemini)
GOOGLE_SERVICE_ACCOUNT_JSON: '{"type":"service_account","project_id":"...","private_key":"-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n","client_email":"...","token_uri":"https://oauth2.googleapis.com/token"}'
GOOGLE_CLOUD_PROJECT: "your-project-id"
GOOGLE_CLOUD_LOCATION: "us-central1"
GEMINI_MODEL: "gemini-2.5-flash"

# Scraping
YOUTUBE_API_KEY: "AIza..."

# Redis (Upstash) — must be rediss:// (TLS). Prod auto-enables Redis rate limiting.
REDIS_URL: "rediss://default:TOKEN@xxx.upstash.io:6379"

# Background scraping — Cloud Scheduler hits /api/internal/scrape with this secret.
# Leave INPROCESS_CRON unset for autoscaling (Cloud Scheduler drives it). Set it to
# "true" only if you deploy with --min-instances 1 --max-instances 1.
CRON_SECRET: "replace_with_random_hex"
# INPROCESS_CRON: "true"

# CORS — your Vercel frontend origin
FRONTEND_URL: "https://your-app.vercel.app"

# Admin allowlist — comma-separated Clerk user ids
ADMIN_CLERK_IDS: "user_xxx"

# Billing (Razorpay now, or swap for Lemon Squeezy later)
RAZORPAY_KEY_ID: "rzp_live_..."
RAZORPAY_KEY_SECRET: "..."
RAZORPAY_WEBHOOK_SECRET: "..."
RZP_PLAN_PRO_MONTHLY: "plan_xxx"
RZP_PLAN_PRO_YEARLY: "plan_xxx"
RZP_PLAN_AGENCY_MONTHLY: "plan_xxx"
RZP_PLAN_AGENCY_YEARLY: "plan_xxx"
