<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrendForge — AI Content Intelligence</title>
  <meta name="description" content="AI-powered content intelligence for solo content creators. Discover viral trends, generate scripts, build your content kit." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;600&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            obsidian: '#08090D',
            'acid-green': '#BFFF00',
            'hot-coral': '#FF3D71',
            'ice-blue': '#00D1FF',
            'glass-bg': 'rgba(255,255,255,0.04)',
            'glass-border': 'rgba(255,255,255,0.08)',
          },
          fontFamily: {
            bebas: ['"Bebas Neue"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
            crimson: ['"Crimson Pro"', 'serif'],
          },
        }
      }
    }
  </script>

  <!-- SVG Grain Filter + Global Styles -->
  <style>
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #BFFF00; border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: #a8e600; }
    * { scrollbar-width: thin; scrollbar-color: #BFFF00 transparent; }

    body {
      background-color: #08090D;
      color: #F0F0F0;
      font-family: 'Crimson Pro', serif;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    /* Glass card base */
    .glass-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .glass-card:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.14);
      box-shadow: 0 0 24px rgba(191,255,0,0.06), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* Animated gradient mesh */
    @keyframes meshRotate {
      0% { transform: rotate(0deg) scale(1.4); }
      100% { transform: rotate(360deg) scale(1.4); }
    }

    .gradient-mesh {
      background: conic-gradient(
        from 0deg at 30% 40%,
        rgba(191,255,0,0.15) 0deg,
        rgba(0,209,255,0.08) 90deg,
        rgba(255,61,113,0.06) 180deg,
        rgba(191,255,0,0.04) 270deg,
        rgba(0,209,255,0.12) 360deg
      );
      animation: meshRotate 20s linear infinite;
    }

    /* Fade up animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-up {
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    /* Shimmer skeleton */
    @keyframes shimmer {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }

    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 1000px 100%;
      animation: shimmer 2s infinite linear;
    }

    /* Progress bar glow */
    .glow-green {
      box-shadow: 0 0 8px rgba(191,255,0,0.6), 0 0 20px rgba(191,255,0,0.2);
    }

    /* Agent step animations */
    @keyframes stepPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .step-active { animation: stepPulse 1s ease-in-out infinite; }

    /* Sidebar transition */
    .sidebar-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

    /* Input focus */
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: rgba(191,255,0,0.5) !important;
      box-shadow: 0 0 0 2px rgba(191,255,0,0.1);
    }

    /* Pill button hover */
    .pill-btn { transition: all 0.15s ease; }
    .pill-btn:hover { transform: translateY(-1px); }
    .pill-btn:active { transform: translateY(0); }

    /* Niche tile animations */
    @keyframes tileSelect {
      0% { transform: scale(1); }
      50% { transform: scale(0.97); }
      100% { transform: scale(1); }
    }
    .tile-select-anim { animation: tileSelect 0.2s ease; }

    /* Studio split */
    .studio-split {
      display: grid;
      grid-template-columns: 55% 45%;
      height: calc(100vh - 64px);
      overflow: hidden;
    }

    @media (max-width: 1024px) {
      .studio-split {
        grid-template-columns: 1fr;
        height: auto;
        overflow: auto;
      }
    }

    /* Phone frame mock */
    .phone-frame {
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      background: rgba(0,0,0,0.4);
    }

    /* Copy button flash */
    @keyframes copyFlash {
      0%, 100% { background: transparent; }
      50% { background: rgba(191,255,0,0.15); }
    }
    .copy-flash { animation: copyFlash 0.4s ease; }

    /* Refresh spin */
    @keyframes spinOnce {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .spin { animation: spinOnce 0.6s linear; }

    /* Badge pulse */
    @keyframes badgePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }
    .badge-pulse { animation: badgePulse 2s ease-in-out infinite; }
  </style>
</head>
<body>
  <!-- Hidden SVG filter for grain -->
  <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
    <defs>
      <filter id="grain-filter" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
        <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
        <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
        <feComposite in="blended" in2="SourceGraphic" operator="in"/>
      </filter>
    </defs>
  </svg>

  <div id="root"></div>

  <style>
    #createos-badge {
      position: fixed;
      bottom: 12px;
      right: 12px;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 999px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.10);
      font-size: 11px;
      font-weight: 500;
      color: #374151;
      text-decoration: none;
      font-family: system-ui, sans-serif;
    }
    #createos-badge:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    #createos-badge img { width: 14px; height: 14px; }
  </style>
  <a id="createos-badge" href="https://createos.sh/app" target="_blank" rel="noopener noreferrer">
    <img src="https://nodeops.network/SymbolBlack.svg" alt="" />
    Built with CreateOS
  </a>
</body>
</html>
